name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            binary: lorebook-linux-x64
          - target: bun-linux-arm64
            binary: lorebook-linux-arm64
          - target: bun-darwin-x64
            binary: lorebook-darwin-x64
          - target: bun-darwin-arm64
            binary: lorebook-darwin-arm64

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.11"

      - run: bun install

      - run: bun build --compile --target=${{ matrix.target }} src/index.ts --outfile ${{ matrix.binary }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: cd dist && sha256sum lorebook-* > SHA256SUMS

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SHA256SUMS
          path: dist/SHA256SUMS

  release:
    needs: checksums
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/
          merge-multiple: true

      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            dist/lorebook-*
            dist/SHA256SUMS
            install.sh
          generate_release_notes: true
